<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KZ Game Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Rajdhani', sans-serif; background: linear-gradient(135deg, #ff3131 0%, #2b52ff 100%); color: white; overflow-x: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: rgba(0, 0, 0, 0.2); }
        .title { font-family: 'Orbitron', sans-serif; font-size: 28px; color: #ffd700; text-shadow: 3px 3px 0px #000; margin: 0; }
        .menu-icon { cursor: pointer; }
        .menu-icon div { width: 30px; height: 4px; background-color: #ffd700; margin: 6px 0; border-radius: 2px; }
        .container { padding: 15px; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .square-box { aspect-ratio: 1 / 1; background: rgba(0, 0, 0, 0.6); border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; cursor: pointer; }
        .box-icon { font-size: 30px; margin-bottom: 5px; }
        .box-text { font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: bold; }
        #price-view { display: none; padding: 10px; }
        .back-header { background: rgba(0,0,0,0.7); padding: 25px; text-align: center; border-radius: 20px; border: 2px solid #ffd700; cursor: pointer; }
        .price-row { display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.5); margin-bottom: 10px; padding: 18px; border-radius: 12px; border-left: 5px solid #ffd700; font-size: 20px; }
        #side-menu { position: fixed; top: 0; right: -100%; width: 75%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 100; transition: 0.4s; padding: 40px 25px; }
        #side-menu.active { right: 0; }
    </style>
</head>
<body>
<header>
    <h1 class="title">KZ GAME SHOP</h1>
    <div class="menu-icon" onclick="toggleMenu()"><div></div><div></div><div></div></div>
</header>
<div class="container">
    <div id="home-page" class="menu-grid">
        <div class="square-box" onclick="showSection('mlbb')"><span class="box-icon">🎮</span><span class="box-text">MLBB</span></div>
        <div class="square-box" onclick="showSection('tiktok')"><span class="box-icon">🎵</span><span class="box-text">TIKTOK</span></div>
        <div class="square-box" onclick="showSection('telegram')"><span class="box-icon">✈️</span><span class="box-text">TELEGRAM</span></div>
    </div>
    <div id="price-view">
        <div class="back-header" onclick="goHome()"><h2 id="section-title"></h2><small>( TAP TO GO BACK )</small></div>
        <div id="price-list"></div>
    </div>
</div>
<div id="side-menu">
    <div style="text-align: right; font-size: 35px; color: #ff3131;" onclick="toggleMenu()">×</div>
    <h3 style="font-family: 'Orbitron'; color: #ffd700;">ADMIN CONTACT</h3>
    <p>👤 <b>ADMIN:</b> @LaPa_PaBu<br>📞 <b>PHONE:</b> 09788319436<br>📢 <b>GROUP:</b> @KixxZGame_Store</p>
</div>
<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const data = {
        mlbb: { name: "MOBILE LEGEND", items: [{label: "💎 Dia 11", price: "1,000Ks"}, {label: "💎 Dia 22", price: "1,900Ks"}, {label: "💎 Dia 33", price: "2,800Ks"}, {label: "💎 Dia 44", price: "3,700Ks"}, {label: "💎 Dia 86", price: "5,100Ks"}, {label: "💎 Dia 172", price: "10,200Ks"}] },
        tiktok: { name: "TIKTOK", items: [{label: "🪙 Coins", price: "Ask Admin"}] },
        telegram: { name: "TELEGRAM", items: [{label: "⭐ Stars", price: "Ask Admin"}] }
    };
    function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); }
    function showSection(key) {
        document.getElementById('home-page').style.display = 'none';
        document.getElementById('price-view').style.display = 'block';
        document.getElementById('section-title').innerText = data[key].name;
        let html = '';
        data[key].items.forEach(i => { html += `<div class="price-row"><span>${i.label}</span><span style="color: #4cd137;">${i.price}</span></div>`; });
        document.getElementById('price-list').innerHTML = html;
    }
    function goHome() { document.getElementById('price-view').style.display = 'none'; document.getElementById('home-page').style.display = 'grid'; }
</script>
</body>
</html>
